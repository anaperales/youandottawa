<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You & Ottawa</title>
    
    <link rel="stylesheet" href="leaflet/leaflet.css" />
    
    <style>
        /* This styles your page to look clean and modern */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
            color: #333;
        }
        .story-section {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            text-align: center;
        }
        .story-section h1 {
            color: #1a4f66;
            font-size: 2.5em;
        }
        .story-section p {
            font-size: 1.2em;
            line-height: 1.6;
        }
        /* This makes the map big and gives it a nice shadow */
        #map {
            height: 600px;
            width: 90%;
            max-width: 1000px;
            margin: 0 auto 50px auto;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="story-section">
        <h1>You & Ottawa</h1>
        <p>A student-led guide to the city's hidden gems.</p>
        <p>Connecting our community to sustainable action. It’s hard to aggregate all the activities and resources fragmented across Ottawa regions and suburbs. Scroll down to explore local, affordable, and sustainable resources.</p>
    </div>

    <div id="map"></div>

    <script src="leaflet/leaflet.js"></script>
    
    <script>
        // This tells the map to center on Ottawa (Latitude, Longitude) and sets the zoom level
        var map = L.map('map').setView([45.4215, -75.6972], 12);

        // This pulls in the free street map visual design
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // This is a test pin! We will eventually link this to your Google Sheet.
        L.marker([45.4236, -75.6835]).addTo(map)
            .bindPopup('<b>uOttawa Free Store</b><br>A great place for zero-waste finds.');
    </script>

</body>
</html>
